  - id: idiolect_detector
    script_path: plugins/setec-voiceprint/scripts/idiolect_detector.py
    surface: voice_coherence
    status: empirically_oriented
    handoff: stable
    consumers:
      - apodictic
    family: idiolect
    purpose: >
      Extract distinctive bigrams and trigrams from a writer's
      baseline corpus that are characteristic enough to flag during
      revision. Outputs a preservation list of phrases worth
      protecting across edits (Dunning's G² for bigrams, PMI for
      trigrams).
    use_when:
      - You're about to revise (or LLM-edit) a draft and want to know which phrasings to preserve
      - The writer has a baseline corpus of ≥ 50K words
      - You want to detect post-revision mimicry / cosplay (paired with mimicry_cosplay_audit)
    do_not_use_when:
      - The baseline is mixed-genre (idiolect signals cross-contaminate across registers)
      - The baseline is under ~20K words (sparse n-grams produce false positives)
    inputs:
      target: optional prose text for post-revision survival check
      required:
        - --baseline-dir or --reference-manifest
    outputs:
      schema_version: "1.0"
      artifacts:
        - .idiolect.json
        - .idiolect.md
    compute:
      tier: core
      cost_note: scipy for G² / PMI; no API costs
      length_floor_words: 20000
    registers:
      - all_fiction
      - all_nonfiction
    dependencies:
      # G²/PMI math requires scipy; NLTK's Brown corpus is an optional
      # convenience for the --reference-corpus brown shortcut.
      python:
        - scipy
      python_optional:
        - nltk
    examples:
      - description: Build a preservation list from a writer's baseline
        cmd: "python3 plugins/setec-voiceprint/scripts/idiolect_detector.py --reference-dir baseline/"
    references:
      - plugins/setec-voiceprint/references/signals-glossary.md

