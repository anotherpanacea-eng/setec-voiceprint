  - id: aic_pattern_audit
    script_path: plugins/setec-voiceprint/scripts/aic_pattern_audit.py
    surface: craft_restoration
    status: heuristic
    handoff: stable
    consumers:
      - apodictic
    family: aic-7-discourse-leak
    purpose: >
      Layer B / Layer C named-pattern density audit. Counts the
      rhetorical patterns AI prose over-produces (correctio,
      pseudo-aphorism, manifesto cadence, triplet, professional-
      parallel stack, false balance, hedge-and-affirm, recommendation
      template, authority laundering) at per-thousand-word density,
      optionally vs. a baseline corpus.
    use_when:
      - Target prose feels "smooth" or "professional" in a way that signals over-production
      - You want surface evidence to complement Tier 1 variance audit
      - You're doing source triage on a manuscript and want flagged sentences for adjudication
    do_not_use_when:
      - You need a binary AI verdict — the audit reports density, the writer adjudicates per instance
      - Target is a technical / legal register where parallel-stack patterns are expected
      - Length floor 400 tokens
    inputs:
      target: prose text file (UTF-8)
      optional:
        - --baseline-dir for relative density comparison
    outputs:
      schema_version: "1.0"
      artifacts:
        - .aic.json
        - .aic.md
    compute:
      tier: core
      cost_note: regex + optional spaCy; no API costs
      length_floor_words: 400
    registers:
      - blog_essay
      - long_form_journalism
      - literary_fiction
    dependencies:
      # Regex detectors are stdlib only; spaCy improves sentence
      # segmentation and is used by some pattern checks when present.
      python: []
      python_optional:
        - spacy
    examples:
      - description: Count all named patterns
        cmd: "python3 plugins/setec-voiceprint/scripts/aic_pattern_audit.py target.md"
      - description: Single pattern with baseline comparison
        cmd: "python3 plugins/setec-voiceprint/scripts/aic_pattern_audit.py target.md --baseline-dir baseline/ --pattern correctio"
    references:
      - plugins/setec-voiceprint/references/aic-flags.md
      - plugins/setec-voiceprint/references/source-triage.md

