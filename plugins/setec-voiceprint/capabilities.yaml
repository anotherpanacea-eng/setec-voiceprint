  - id: validation_harness
    script_path: plugins/setec-voiceprint/scripts/validation_harness.py
    surface: validation
    status: empirically_oriented
    handoff: stable
    consumers:
      - apodictic
    family: validation
    purpose: >
      Empirical validation harness for SETEC task-surface outputs.
      Computes FPR / TPR / AUC / AUPRC with Wilson / Clopper-Pearson
      CIs against a labeled manifest, enforces prompt-level grouping,
      and refuses to mix scores across task surfaces because the
      surfaces answer different questions.
    use_when:
      - You have a labeled corpus (with valid `corpus_manifest.jsonl`) and want to measure how SETEC signals behave on it
      - You're calibrating thresholds for an operator-specific corpus
      - You want CIs alongside point estimates (the framework's default)
    do_not_use_when:
      - The manifest is unvalidated — run manifest_validator first
      - The corpus is mixed-state (ai_status) without slicing — the harness refuses to pool
      - You want a single surface metric to be authoritative — the harness intentionally surfaces all surfaces
    inputs:
      target: corpus manifest JSONL
    outputs:
      schema_version: "1.0"
      artifacts:
        - .validation.json
        - .validation.md
    compute:
      tier: core
      cost_note: scikit-learn + statsmodels for CIs; no API costs
      length_floor_words: null
    registers:
      - all_fiction
      - all_nonfiction
    dependencies:
      # validation_harness has stdlib fallbacks for both ranking
      # metrics (fallback_roc_auc / fallback_average_precision with
      # method=stdlib_fallback) and proportion intervals
      # (wilson_interval, ci_method=stdlib:wilson). The full feature
      # set — sklearn's precision-recall curves, statsmodels'
      # Clopper-Pearson / Jeffreys / Agresti-Coull intervals — needs
      # both deps, but the harness's primary use case runs without
      # either (operators see ci_method=stdlib:wilson and
      # method=stdlib_fallback in their output and know which path
      # ran). Demoted from required → optional per PR #129 review.
      python: []
      python_optional:
        - sklearn       # tightens ROC / PR / confusion matrix; stdlib fallback otherwise
        - statsmodels   # adds Clopper-Pearson / Jeffreys CIs; Wilson stdlib fallback otherwise
    examples:
      - description: Validate against a labeled corpus
        cmd: "python3 plugins/setec-voiceprint/scripts/validation_harness.py corpus/manifest.jsonl"
    references:
      - plugins/setec-voiceprint/references/manifest-schema.md
      - plugins/setec-voiceprint/references/calibration-findings-2026-05-10.md

  - id: variance_audit
    script_path: plugins/setec-voiceprint/scripts/variance_audit.py
    surface: smoothing_diagnosis
    status: empirically_oriented
    handoff: stable
    consumers:
      - apodictic
    family: tier1-variance
    purpose: >
      Layer A distributional diagnostic for AI-prose smoothing. Computes
      sentence-length variance, lexical diversity (MATTR / MTLD / Yule's
      K / Shannon), reading-level spread (FKGL SD), and POS-bigram /
      surprisal signals; reports per-signal values with operator-side
      band calls.
    use_when:
      - First pass on any prose where you want distributional evidence of mode-collapse
      - You have a baseline corpus (the writer's own prior work or a register match)
      - Target is ≥ 200 words for Tier 1; ≥ 500 for Tier 2/3; ≥ 2000 for Tier 4 surprisal
    do_not_use_when:
      - Target is ESL writing without a matched ESL baseline (the 2026-05-10 EditLens finding shows polarity inverts on ESL student writing)
      - You want a single AI/human verdict — variance_audit reports values, not a label
      - Target is under 200 words (Tier 1 length floor)
    inputs:
      target: prose text file (UTF-8)
      optional:
        - --baseline-dir pointing at a corpus of comparable register
    outputs:
      schema_version: "1.0"
      artifacts:
        - .variance.json
        - .variance.md
    compute:
      tier: surprisal
      cost_note: >
        Tier 1 is stdlib + tokenization. Tier 2/3 need spaCy +
        en_core_web_sm. Tier 4 surprisal needs transformers + a small
        causal LM (default tinyllama, ~600 MB); the --tier4 flag opts in.
      length_floor_words: 200
    registers:
      - literary_fiction
      - blog_essay
      - academic_philosophy
      - long_form_journalism
    dependencies:
      # Tier 1 variance signals run on stdlib alone. Everything below
      # is opt-in tier work that degrades gracefully when missing.
      python: []
      python_optional:
        - spacy             # Tier 2 (POS-bigram entropy, MDD)
        - sklearn           # Tier 3 cohesion via TF-IDF fallback
        - sentence_transformers  # Tier 3 cohesion calibrated
        - textstat          # tightens FKGL; stdlib approximation fallback
        - nltk              # NLTK sentence tokenization; regex fallback
        - numpy             # vectorized stats; stdlib fallback for small docs
        - transformers      # Tier 4 surprisal; only with --tier4
    examples:
      - description: Whole-document smoothing diagnosis
        cmd: "python3 plugins/setec-voiceprint/scripts/variance_audit.py target.md"
      - description: Layer A + Layer B (with AIC-8/9 detectors)
        cmd: "python3 plugins/setec-voiceprint/scripts/variance_audit.py target.md --aic8 --aic9"
    references:
      - plugins/setec-voiceprint/references/signals-glossary.md
      - plugins/setec-voiceprint/references/distributional-diagnostics.md
      - plugins/setec-voiceprint/references/calibration-findings-2026-05-10.md

  - id: voice_distance
    script_path: plugins/setec-voiceprint/scripts/voice_distance.py
    surface: voice_coherence
    status: empirically_oriented
    handoff: stable
    consumers:
      - apodictic
    family: voice-distance
    purpose: >
      Compare a target text against a specific writer's (or
      register's) baseline using classic stylometric feature families
      — Burrows Delta on function words, per-feature cosine distance,
      POS-bigram comparison. Answers "how far has this draft drifted
      from this writer's prior voice?"
    use_when:
      - You have a baseline of the writer's prior prose (≥ 20K words for tight bounds)
      - You suspect voice drift across drafts / time / register
      - You want to identify which feature families drove the drift (Delta + per-family cosine)
    do_not_use_when:
      - You don't have a writer-specific baseline (use variance_audit against a register baseline instead)
      - The baseline is mixed-state (some pre-AI, some AI-assisted) without slicing by ai_status
      - Target is under ~2000 words (Burrows Delta is noisy below that)
    inputs:
      target: prose text file (UTF-8)
      required:
        - --baseline-dir pointing at the writer's prior work
    outputs:
      schema_version: "1.0"
      artifacts:
        - .voice_distance.json
        - .voice_distance.md
    compute:
      tier: core
      cost_note: stdlib + spaCy; no API costs
      length_floor_words: 2000
    registers:
      - all_fiction
      - all_nonfiction
    dependencies:
      # Function-word Burrows Delta is computable from stdlib alone;
      # the per-feature cosine paths benefit from spaCy.
      python: []
      python_optional:
        - spacy
    examples:
      - description: Voice-drift comparison against a baseline
        cmd: "python3 plugins/setec-voiceprint/scripts/voice_distance.py target.md --baseline-dir baseline/"
    references:
      - plugins/setec-voiceprint/references/signals-glossary.md
      - plugins/setec-voiceprint/references/stylometry-oracle.md

