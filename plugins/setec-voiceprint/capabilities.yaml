# SETEC Voiceprint capabilities manifest
# Single source of truth for every user-facing script in
# the framework. Hand-edited; do not let it drift from the
# linter at tools/check_capabilities_drift.py.
#
# Status vocabulary:
#   - todo: auto-seeded; hand-curated fields missing
#   - heuristic: shipped, not yet calibrated
#   - empirically_oriented: local experimentation
#   - literature_anchored: peer-reviewed anchor
#   - calibrated: corpus-tested with FPR/TPR metrics
#   - structural_only: feeds downstream signals, not user-facing
#
# dependencies vocabulary (v0.2.0):
#   - python:          required Python packages. Their absence means
#                      the audit's PRIMARY use case won't run. The
#                      --available filter gates on this list.
#   - python_optional: graceful-degradation packages. Their absence
#                      means a non-primary feature falls back (e.g.,
#                      sentence_transformers → TF-IDF, textstat →
#                      stdlib FKGL approximation, NLTK → regex
#                      tokenizer). The audit still runs; --available
#                      reports them as missing-but-not-blocking.
#   - sdks_optional:   third-party API SDKs (anthropic, openai,
#                      google-genai). Informational only.
#
# handoff posture vocabulary (v0.3.0):
#   - stable:       pin against this. SETEC's schema_version + semver
#                   discipline the contract. Breaking changes bump to
#                   2.0.0. Entries with handoff: stable MUST carry
#                   non-empty `references` (drift linter enforces).
#   - experimental: designed as a consumer surface but contract may
#                   evolve before 2.0.0. Consumers welcome to pin,
#                   with the understanding that the envelope shape
#                   may shift. Use for new surfaces in their first
#                   release cycle.
#   - internal:     emits the standard envelope but is operator-side
#                   tooling (dependency_check, manifest_validator);
#                   downstream consumers shouldn't depend on it.
#   - none:         not a consumer surface (research scaffolds,
#                   helper modules, replication stages). Default for
#                   auto-seeded entries.
#
# consumers (v0.3.0):
#   Free-list of named downstream integrations that pin against this
#   entry. Known values today: `apodictic`, `ultrareview`,
#   `external_integrations`. New consumers can be added without
#   schema change; the list is documentation, not enforcement.
#
# Schema version: 0.3.0  (capabilities manifest v0.3 — added handoff
# posture + consumers list. Makes the consumer-pinning contract
# explicit and queryable; documents which audits are designed for
# downstream handoff vs. which are operator-side or research-only.)
