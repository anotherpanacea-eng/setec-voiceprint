entries:
- id: sound_texture_audit
  script_path: plugins/setec-voiceprint/scripts/sound_texture_audit.py
  surface: sound_texture
  status: heuristic
  handoff: experimental
  consumers: []
  family: voice-coherence
  purpose: 'Descriptive sound-texture profile of prose — alliteration / assonance
    / consonance adjacency density and a consonant-class (plosive / fricative / sibilant
    / nasal / liquid / glide) profile — via an orthographic-onset proxy. The sonic
    layer the shipped suite (sentence-length variance only) is blind to. NOT a phonetic
    transcription, NOT an AI detector, NOT a quality judgment: measurements only (no
    band/verdict); the claim-license refuses AI-provenance / voice-identity / quality
    inference. Optional baseline-dir reports each metric as a deviation from the writer''s
    own baseline.

    '
  use_when:
  - You want a sonic-texture profile (alliteration / assonance / consonance / consonant-class)
    of a passage
  - You're developmentally editing literary prose where sound is part of voice
  - Target is >= 300 words
  do_not_use_when:
  - You want an AI-provenance call (this is explicitly NOT an AI signal)
  - You want a writing-quality judgment or a voice/authorship inference
  - You need a true phonetic transcription (this is an orthographic proxy, not phonemes)
  - Target is under 300 words (the length floor)
  inputs:
    target: prose/markdown text file (UTF-8)
    optional:
    - --baseline-dir to report metrics as deviation from the writer's own baseline
  outputs:
    schema_version: '1.0'
    artifacts:
    - stdout markdown report (default), --json envelope, or --out PATH
  compute:
    tier: core
    cost_note: stdlib only; no models, CPU-trivial.
    length_floor_words: 300
  registers:
  - literary_fiction
  - blog_essay
  dependencies:
    python: []
    python_optional: []
  examples:
  - description: Sound-texture profile to stdout
    cmd: python3 plugins/setec-voiceprint/scripts/sound_texture_audit.py target.md
  - description: Deviation vs the writer's own baseline
    cmd: python3 plugins/setec-voiceprint/scripts/sound_texture_audit.py target.md
      --baseline-dir baselines/personal/
  references:
  - specs/17-sound-texture-audit.md
