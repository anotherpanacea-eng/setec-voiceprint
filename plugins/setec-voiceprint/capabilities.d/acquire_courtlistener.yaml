entries:
- id: acquire_courtlistener
  script_path: plugins/setec-voiceprint/scripts/acquire_courtlistener.py
  surface: voice_coherence_acquisition
  status: todo
  handoff: none
  consumers: []
  family: acquisition
  purpose: acquire legal briefs (--doc-type brief -> legal_brief) or expert
    affidavits/declarations (--doc-type affidavit -> expert_affidavit) from
    CourtListener / RECAP into the impostor pool (the population baselines
    argmove_profile profiles).
  use_when:
  - building the legal_brief population baseline from public-record RECAP briefs
  - building the expert_affidavit population baseline from public-record RECAP
    declarations (--doc-type affidavit applies the structural + OCR screens)
  do_not_use_when:
  - the source is not the CourtListener v4 API
  inputs:
    target: CourtListener v4 REST API (Token header auth)
  outputs:
    schema_version: '1.0'
    artifacts:
    - impostor .txt + .meta.json under ai-prose-baselines-private/impostors/<register>/<persona>/
    - draft_manifest.jsonl (corpus_role impostor)
  compute:
    tier: acquisition
    cost_note: network-bound; search cursor pagination plus one detail fetch per
      document; per-doc-type word floors (brief 3000, affidavit 1000)
    length_floor_words: 3000
  registers:
  - legal_brief
  - expert_affidavit
  dependencies:
    python: []
  examples: []
  references:
  - plugins/setec-voiceprint/references/acquire-corpus-pattern.md
  _seeded_at: '2026-06-11'
