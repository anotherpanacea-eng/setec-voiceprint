entries:
- id: rewriting_invariance_audit
  script_path: plugins/setec-voiceprint/scripts/rewriting_invariance_audit.py
  surface: rewriting_invariance
  status: heuristic
  handoff: experimental
  consumers: []
  family: discrimination
  purpose: 'Raidar-style rewriting-invariance discrimination evidence: prompt an LLM
    to "rewrite to improve clarity," then measure how much it changed the text (edit-distance
    / token-overlap) averaged over N trials. Low change ⇒ more AI-like, high ⇒ more
    human-like. A paraphrase-robust axis orthogonal to perplexity. Uncalibrated: emits
    the distance + provenance only (no band, no verdict); strongly dependent on the
    judge model + exact prompt (both pinned in provenance). Clean-room implementation
    of the published idea (Mao et al., ICLR 2024) — no Raidar repo code/data vendored.

    '
  use_when:
  - You want a discrimination signal that survives paraphrase attacks on perplexity
    detectors
  - You have an operator-supplied LLM (API key or local instruct model) to do the
    rewriting
  - You're stacking signals and want an axis orthogonal to surprisal / Binoculars
  do_not_use_when:
  - You want an AI/human verdict (this surface is uncalibrated and ships no threshold)
  - You cannot pin a single judge model + prompt (the distance is meaningless without
    them)
  - You can't absorb per-call LLM cost (each trial is a billed rewrite; cost scales
    with --n)
  inputs:
    target: prose text file (UTF-8)
    required:
    - --judge MODEL (operator-supplied LLM model id used to rewrite)
  outputs:
    schema_version: '1.0'
    artifacts:
    - stdout markdown report (default), --json envelope, or --out PATH
  compute:
    tier: api_llm
    cost_note: 'N billed LLM rewrite calls per audit (one per trial); cost scales
      with --n and target length. Operator supplies the LLM SDK + key.

      '
    length_floor_words: 50
  registers:
  - blog_essay
  - long_form_fiction
  - testimony_policy
  dependencies:
    python: []
    python_optional: []
    sdks_optional:
    - anthropic
  examples:
  - description: Rewriting-invariance audit (markdown report)
    cmd: python3 plugins/setec-voiceprint/scripts/rewriting_invariance_audit.py target.txt
      --judge claude-sonnet-4-6
  - description: JSON envelope, 5 trials
    cmd: python3 plugins/setec-voiceprint/scripts/rewriting_invariance_audit.py target.txt
      --judge claude-sonnet-4-6 --n 5 --json
  references:
  - specs/15-raidar-rewriting-invariance.md
  _seeded_at: '2026-06-06'
