entries:
- id: argmove_profile
  script_path: plugins/setec-voiceprint/scripts/argmove_profile.py
  surface: assertoric
  status: empirically_oriented
  handoff: none
  consumers: []
  family: argument-moves
  purpose: aggregate the deterministic B4 stance + B3 abstraction signals plus
    the net-new AGD marker module (assuring/guarding/discounting) over a corpus
    into an argument-move population profile, and run the two-corpus separation
    test (Cliff's delta primary, Cohen's d secondary) — the cheap, judge-free
    half of ArgScope, gating any B1/B2 LLM-judge spend.
  use_when:
  - building an argument-register population baseline (the profiles the
    acquisition-tier registers feed)
  - answering whether deterministic signals separate two corpora (e.g. human
    vs LLM argument) before spending on the LLM judge
  do_not_use_when:
  - paragraph-role / discourse-mode labeling is needed (that is the B1/B2 LLM
    judge, a separate surface)
  - a provenance verdict about a text or person is wanted (no verdict by design)
  inputs:
    target: a corpus directory of .txt/.md documents (default substantiality
      floor 300 words; --compare takes two directories)
  outputs:
    schema_version: '1.0'
    artifacts:
    - argmove profile JSON (per-signal mean/sd/cv/median/p10-p90 bands)
    - compare JSON (per-signal Cliff's delta + Cohen's d, sorted by |delta|)
  compute:
    tier: core
    cost_note: CPU-bound; two reused stdlib audits (stance B4, agency B3) plus
      regex AGD markers per document; no model load
    length_floor_words: 300
  registers:
  - policy_brief
  - testimony_policy
  - scholarly_article
  - legal_brief
  - regulatory_comment
  - grant_proposal
  - expert_affidavit
  dependencies:
    python: []
  examples: []
  references: []
  _seeded_at: '2026-06-12'
