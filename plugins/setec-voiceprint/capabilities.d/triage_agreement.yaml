entries:
- id: triage_agreement
  script_path: plugins/setec-voiceprint/scripts/triage_agreement.py
  surface: validation
  status: heuristic
  handoff: experimental
  consumers: []
  family: validation
  purpose: 'Measures the agreement between the framework''s surfaced candidates and
    an operator''s triage judgments on a labeled item set: confusion matrix, percent
    agreement, Cohen''s kappa, the prevalence-and-bias-adjusted kappa (PABAK), and
    a seeded bootstrap CI on kappa. Closes the loop the framework keeps open on principle
    ("source triage is judgment work"). Measures CONCORDANCE, not correctness — it
    never decides who is right.

    '
  use_when:
  - You have paired (framework, human) triage decisions and want the agreement as
    a number
  - You want to know whether the framework's candidate-surfacing matches expert reads
    on a register
  - You have at least 10 triaged items
  do_not_use_when:
  - You want a ground-truth verdict (kappa measures agreement, not correctness)
  - You want to generalize beyond this (possibly non-representative) item set
  - You have fewer than 10 items (kappa is meaningless at very small N)
  inputs:
    target: JSONL (default) or CSV of per-item framework + human triage labels
  outputs:
    schema_version: '1.0'
    artifacts:
    - stdout markdown report (default), --json envelope, or --out PATH
  compute:
    tier: core
    cost_note: stdlib only; bootstrap is seeded + deterministic.
  dependencies:
    python: []
    python_optional: []
  examples:
  - description: Agreement statistics to stdout
    cmd: python3 plugins/setec-voiceprint/scripts/triage_agreement.py labels.jsonl
  - description: CSV input with a larger bootstrap
    cmd: python3 plugins/setec-voiceprint/scripts/triage_agreement.py labels.csv --format
      csv --bootstrap 5000
  references:
  - plugins/setec-voiceprint/specs/18-triage-agreement.md
