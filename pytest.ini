[pytest]
# `testpaths` keeps a bare `pytest` (from the repo root) scoped to the suite.
#
# Parallelism is OPT-IN, not a default here: run `pytest -n auto` (needs
# pytest-xdist: `pip install pytest-xdist`). CI always passes parallelism
# explicitly; Spec 73 defines both the instrumented `-n auto` baseline and its
# bounded-lane candidate. See `.github/workflows/tests.yml`.
#
# Why not `addopts = -n auto`? It would make a bare `pytest` HARD-ERROR (exit 4,
# "unrecognized arguments: -n") in any env without pytest-xdist. A conftest that
# injects `-n auto` only when xdist is importable is unreliable on pytest 9 (the
# default is read before a local conftest can set it), so the explicit-flag form
# is the robust choice.
testpaths = plugins/setec-voiceprint/scripts/tests
