[pytest]
# The suite is ~4,300 tests; serial it runs ~7 min. Parallelize across cores by
# default via pytest-xdist. `-n auto` resolves to the available CPUs (2-4 on CI,
# more locally), so it's correct on every host — do not hardcode a worker count.
#
# Requires pytest-xdist (CI installs it; locally: `pip install pytest-xdist`).
# To run serially — e.g. for `--pdb`, `--trace`, or a single fast test where
# worker startup outweighs the win — override with `-n0`:  pytest -n0 -k mytest
addopts = -n auto
testpaths = plugins/setec-voiceprint/scripts/tests
