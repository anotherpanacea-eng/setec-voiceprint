name: tests

# Core-tier CI: runs the stdlib + spaCy + scikit-learn/statsmodels test
# suite on every PR and push to main. The Tier-4 surprisal / embedding
# tiers need torch (GPU wheels unavailable on GitHub-hosted runners), so
# those tests skip here (skipif on missing torch) and run on the local
# GPU host instead. See plugins/setec-voiceprint/scripts/calibration/
# RUNBOOK_tier4_install.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-monolith:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r plugins/setec-voiceprint/requirements.txt
          # The Gmail acquirer tests exercise the required HTML path, whose
          # BeautifulSoup dependency lives in the opt-in acquisition tier.
          pip install -r plugins/setec-voiceprint/requirements-acquisition.txt
          # pypdf: hard-imported by test_pdf_inventory_extract.py (no
          # importorskip guard), so it must be present for collection.
          # click: spaCy's `download` CLI imports it directly, and recent
          # typer no longer pulls it in transitively.
          # pytest-xdist: parallel test execution (`-n auto`, set in pytest.ini)
          # — the suite is ~4,300 tests and serial it runs ~7 min.
          pip install pypdf pytest pytest-xdist click
          # spaCy Tier-2/Tier-3 model (not on PyPI).
          python -m spacy download en_core_web_sm

      - name: Verify test plan and capture canonical collection
        run: |
          python3 tools/ci_test_plan.py verify \
            --collect \
            --collection-out "${{ runner.temp }}/ci-collection.json"

      - name: Run test suite
        run: |
          # -n auto: parallel via pytest-xdist (installed above). Explicit here so
          # this instrumented baseline preserves the pre-Spec-73 execution topology.
          python3 tools/ci_test_plan.py run-pytest \
            --ci-result-out "${{ runner.temp }}/ci-monolith-result.json" \
            -- \
            plugins/setec-voiceprint/scripts/tests \
            -n auto \
            -q \
            -rs

      # Consistency gates AGENTS.md treats as enforcement (manifest <-> source
      # drift, contract-fixture drift, changelog coverage, calibration-readiness
      # freshness). Previously only run by hand pre-push; wiring them into CI so
      # drift can't land unblocked. `if: always()` so they report even when the
      # test step above failed — the two signals are independent.
      - name: Consistency gates
        if: always()
        run: |
          python3 tools/check_capabilities_drift.py
          python3 tools/check_docs_freshness.py
          python3 tools/gen_calibration_readiness.py --check

      - name: Upload canonical collection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-collection
          path: ${{ runner.temp }}/ci-collection.json
          if-no-files-found: error

      - name: Upload monolithic result report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-result-pytest-monolith
          path: ${{ runner.temp }}/ci-monolith-result.json
          if-no-files-found: error

  macos-descriptor-confinement:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run atomic iMessage descriptor-confinement suite
        run: |
          python -m pytest \
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py \
            -q -rs

  windows-descriptor-backend:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install pytest tzdata

      - name: Run Windows handle-relative writer, guard, and conflict-copy tests
        shell: pwsh
        run: |
          python -m pytest `
            plugins/setec-voiceprint/scripts/tests/test_manifest_validator_conflict_copies.py `
            plugins/setec-voiceprint/scripts/tests/test_windows_descriptor_backend.py `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_approved_refuses_output_outside_private_root_without_writes `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_bootstrap_resumes_interrupted_approved_snapshot_copy `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_bootstrap_refuses_foreign_staging_artifact `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_bootstrap_resumes_zero_byte_snapshot_prefix `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_bootstrap_refuses_raced_empty_final_destination `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_full_run_preserves_approved_policy_and_resumes_rows `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_run_resumes_after_k_row_publications `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_run_refuses_foreign_root_artifact_on_resume `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_offline_cli_loads_approved_portable_key_and_runs `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_direct_script_invocation_help_avoids_circular_import `
            plugins/setec-voiceprint/scripts/tests/test_acquire_imessage_sent_atomic.py::test_direct_script_invocation_validate_run_fails_controlled_not_via_import_error `
            -q `
            --basetemp "${{ runner.temp }}\\setec-win-descriptor"

  windows-owner-corrections:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        run: python -m pip install pytest

      - name: Run owner-corrections Windows contract tests
        shell: pwsh
        run: |
          python -m pytest `
            plugins/setec-voiceprint/scripts/tests/test_apply_owner_corrections.py `
            -q `
            --basetemp "${{ runner.temp }}\\setec-win-owner-corrections"

  windows-private-writer-guards:
    # The private-corpus writers harden file modes with POSIX-only os.fchmod,
    # which does not exist on native Windows, so an unguarded call raises
    # AttributeError. The Linux/macOS lanes never see it and the other focused
    # Windows lanes above only run their own files, so a bare fchmod can land
    # invisibly. This lane runs the writers whose atomic() path is
    # Windows-REACHABLE and hits fchmod -- normalize_author_registry and
    # prepare_author_document_adapter -- so their guards are genuine crash fixes
    # regression-covered here. author_corpus_export is included because its
    # export-seam fixture is hash-pinned and must stay LF (see .gitattributes) or
    # core.autocrlf=true on this runner remangles it into a "source content hash
    # mismatch" failure.
    #
    # Scope caveats (no overclaiming):
    #   - The os.name=="posix" chmod guards are NOT regression-covered by
    #     pass/fail here: os.chmod exists on Windows and silently succeeds, so a
    #     regressed chmod guard would not fail this lane. It catches the fchmod
    #     AttributeError class only.
    #   - compose_imessage_review_bursts is deliberately absent: its production
    #     entry point raises ReviewBurstError("requires macOS") before reaching
    #     either fchmod site, so its guards are defensive dead-code hardening --
    #     not Windows-reachable and not meaningfully testable on windows-latest.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependency
        # pyyaml: test_author_corpus_export's dispatcher tests load the
        # capabilities manifest, whose loader imports yaml (capabilities.py).
        run: python -m pip install pytest tzdata pyyaml

      - name: Run private-writer mode-guard and export-seam tests on native Windows
        shell: pwsh
        run: |
          # test_adapter_refuses_declared_nonbaseline_material is deselected: it
          # fails on native Windows for an UNRELATED reason (it constructs a path
          # containing filename-illegal characters -> WinError 123), is
          # pre-existing on main, and is tracked as a separate follow-up.
          # Deselecting keeps that known failure from poisoning this lane while
          # the rest of the file still regression-covers the fchmod guard.
          python -m pytest `
            plugins/setec-voiceprint/scripts/tests/test_normalize_author_registry.py `
            plugins/setec-voiceprint/scripts/tests/test_author_corpus_export.py `
            plugins/setec-voiceprint/scripts/tests/test_prepare_author_document_adapter.py `
            --deselect "plugins/setec-voiceprint/scripts/tests/test_prepare_author_document_adapter.py::test_adapter_refuses_declared_nonbaseline_material" `
            -q `
            --basetemp "${{ runner.temp }}\\setec-win-private-writers"

  windows-ci-test-plan:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused test dependencies
        run: python -m pip install pytest pytest-xdist

      - name: Run CI planner portability and child-process tests
        shell: pwsh
        run: |
          python -m pytest `
            plugins/setec-voiceprint/scripts/tests/test_ci_test_plan.py `
            plugins/setec-voiceprint/scripts/tests/test_ci_pytest_plugin.py `
            -q `
            -rs `
            --basetemp "${{ runner.temp }}\\setec-win-ci-test-plan"

  pytest:
    if: always()
    needs:
      - pytest-monolith
      - macos-descriptor-confinement
      - windows-descriptor-backend
      - windows-owner-corrections
      - windows-private-writer-guards
      - windows-ci-test-plan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download canonical collection
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: ci-collection
          path: ${{ runner.temp }}/ci-aggregate/collection

      - name: Download monolithic result report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: ci-result-pytest-monolith
          path: ${{ runner.temp }}/ci-aggregate/results

      - name: Verify monolithic result conservation
        if: always()
        run: |
          python3 tools/ci_test_plan.py verify-results \
            --collection-report "${{ runner.temp }}/ci-aggregate/collection/ci-collection.json" \
            --result "${{ runner.temp }}/ci-aggregate/results/ci-monolith-result.json"

      - name: Require every baseline dependency to succeed
        if: always()
        env:
          PYTEST_MONOLITH_RESULT: ${{ needs['pytest-monolith'].result }}
          MACOS_DESCRIPTOR_RESULT: ${{ needs['macos-descriptor-confinement'].result }}
          WINDOWS_DESCRIPTOR_RESULT: ${{ needs['windows-descriptor-backend'].result }}
          WINDOWS_OWNER_CORRECTIONS_RESULT: ${{ needs['windows-owner-corrections'].result }}
          WINDOWS_PRIVATE_WRITERS_RESULT: ${{ needs['windows-private-writer-guards'].result }}
          WINDOWS_CI_PLAN_RESULT: ${{ needs['windows-ci-test-plan'].result }}
        run: |
          if [[ "$PYTEST_MONOLITH_RESULT" != "success" || \
                "$MACOS_DESCRIPTOR_RESULT" != "success" || \
                "$WINDOWS_DESCRIPTOR_RESULT" != "success" || \
                "$WINDOWS_OWNER_CORRECTIONS_RESULT" != "success" || \
                "$WINDOWS_PRIVATE_WRITERS_RESULT" != "success" || \
                "$WINDOWS_CI_PLAN_RESULT" != "success" ]]; then
            echo "required baseline dependency did not succeed" >&2
            exit 1
          fi
